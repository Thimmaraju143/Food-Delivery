<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NW.js Module Test</title>
</head>
<body>
  <h1>Node-webkit-based module test</h1>
  <script>
    window.onload = function nwModuleTest() {
      // Make sure there is at least one argument passed
      const args = nw.App.fullArgv || [];  // safer way than just nw.App.argv
      if (!args.length) {
        console.error("Error: No module path provided as argument.");
        return;
      }

      const modulePath = args[0];

      try {
        require(modulePath);
        console.log("✅ Module loaded successfully:", modulePath);
      } catch (e) {
        console.error('❌ nw-pre-gyp error:');
        console.error(e.stack);
      }

      // Proper way to exit NW.js app
      nw.process.exit(0);  // or use nw.Window.get().close();
    }
  </script>
</body>
</html>
